services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: kicau_ai_gateway
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - CHROMA_HOST=chromadb
      - CHROMA_PORT=8000
    depends_on:
      - chromadb
    volumes:
      - app_data:/code/app
    restart: unless-stopped

  chromadb:
    image: chromadb/chroma:latest
    container_name: kicau_chromadb
    ports:
      - "8001:8000"
    volumes:
      - chroma_data:/chroma/chroma
    restart: unless-stopped

volumes:
  app_data:
  chroma_data:
