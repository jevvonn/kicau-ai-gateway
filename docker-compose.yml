services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: kicau_ai_gateway
    ports:
      - "4000:4000"
    env_file:
      - .env
    environment:
      - CHROMA_HOST=chromadb
      - CHROMA_PORT=8000
    depends_on:
      chromadb:
        condition: service_healthy
    volumes:
      - app_data:/code/app
    restart: unless-stopped

  chromadb:
    image: chromadb/chroma:latest
    container_name: kicau_chromadb
    ports:
      - "8001:8000"
    volumes:
      - chroma_data:/chroma/chroma
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v2/heartbeat"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

volumes:
  app_data:
  chroma_data:
